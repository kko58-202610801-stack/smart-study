<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>스터디 플래너</title>
  <style>
    :root {
      --primary-color: #70c4e8;
      --bg-color: #f0f8ff;
      --card-bg: #ffffff;
      --text-color: #333333;
      --sub-text: #666666;
      --border-color: #e0e0e0;
    }

    /* 다크모드 전용 스타일 프로퍼티 정의 */
    [data-theme="dark"] {
      --primary-color: #55aacc;
      --bg-color: #121212;
      --card-bg: #1e1e1e;
      --text-color: #e0e0e0;
      --sub-text: #a0a0a0;
      --border-color: #333333;
    }

    body {
      margin: 0;
      padding: 0;
      font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, Roboto, sans-serif;
      background-color: var(--bg-color);
      color: var(--text-color);
      display: flex;
      justify-content: center;
      min-height: 100vh;
      transition: background-color 0.3s ease, color 0.3s ease;
    }

    /* 암호 보호 모달 화면 */
    #lockScreen {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background-color: var(--bg-color);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 9999;
    }

    .lock-box {
      background: var(--card-bg);
      padding: 30px;
      border-radius: 16px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
      text-align: center;
      max-width: 320px;
      width: 80%;
      border: 1px solid var(--border-color);
    }

    .lock-box h2 {
      margin-top: 0;
      color: var(--text-color);
      font-size: 1.2rem;
    }

    .lock-box input[type="password"] {
      width: 100%;
      padding: 12px;
      font-size: 1.2rem;
      letter-spacing: 10px;
      text-align: center;
      background-color: var(--bg-color);
      color: var(--text-color);
      border: 1px solid var(--border-color);
      border-radius: 8px;
      margin-bottom: 15px;
      box-sizing: border-box;
      outline: none;
    }

    .lock-btn {
      width: 100%;
      padding: 12px;
      background-color: var(--primary-color);
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: bold;
      cursor: pointer;
    }

    /* 메인 앱 컨테이너 */
    .app-container {
      width: 100%;
      max-width: 480px;
      background-color: var(--card-bg);
      min-height: 100vh;
      box-shadow: 0 0 20px rgba(0, 0, 0, 0.05);
      display: flex;
      flex-direction: column;
      position: relative;
      display: none; /* 비밀번호 풀리기 전까지 숨김 */
    }

    /* 헤더 */
    header {
      background-color: var(--primary-color);
      color: white;
      padding: 20px 20px 10px 20px;
      text-align: center;
      position: relative;
    }

    header h1 {
      margin: 0 0 15px 0;
      font-size: 1.3rem;
    }

    .theme-picker {
      position: absolute;
      right: 15px;
      top: 20px;
      display: flex;
      gap: 5px;
      align-items: center;
    }

    .color-btn {
      width: 20px;
      height: 20px;
      border-radius: 50%;
      border: 2px solid white;
      cursor: pointer;
    }

    /* 다크모드 토글 버튼 */
    .darkmode-toggle {
      background: none;
      border: none;
      color: white;
      font-size: 1.1rem;
      cursor: pointer;
      padding: 0 5px;
    }

    /* 상단 탭 메뉴 */
    .tab-menu {
      display: flex;
      background: rgba(255, 255, 255, 0.2);
      border-radius: 8px;
      padding: 4px;
      margin-top: 10px;
    }

    .tab-btn {
      flex: 1;
      background: none;
      border: none;
      color: rgba(255, 255, 255, 0.8);
      padding: 8px 0;
      font-size: 0.9rem;
      cursor: pointer;
      font-weight: bold;
      border-radius: 6px;
      transition: all 0.2s;
    }

    .tab-btn.active {
      background: white;
      color: var(--primary-color);
    }

    /* 메인 컨텐츠 영역 */
    main {
      padding: 20px;
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .tab-content {
      display: none;
    }

    .tab-content.active {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .card {
      background-color: var(--card-bg);
      border: 1px solid var(--border-color);
      border-radius: 12px;
      padding: 16px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.02);
    }

    /* 프로필 & 등급 */
    .profile-section {
      text-align: center;
    }

    .tier-badge {
      display: inline-block;
      background-color: var(--primary-color);
      color: white;
      font-weight: bold;
      padding: 6px 16px;
      border-radius: 20px;
      font-size: 0.9rem;
      margin-bottom: 8px;
    }

    .streak-info {
      font-size: 0.85rem;
      color: var(--sub-text);
    }

    /* 동기부여 메시지 박스 */
    .message-section {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .message-box {
      background-color: rgba(112, 196, 232, 0.15);
      border-left: 4px solid var(--primary-color);
      padding: 15px;
      border-radius: 4px;
      font-size: 0.9rem;
      font-weight: 500;
      line-height: 1.4;
      min-height: 40px;
      display: flex;
      align-items: center;
    }

    [data-theme="dark"] .message-box {
      background-color: rgba(112, 196, 232, 0.05);
    }

    .msg-refresh-btn {
      background-color: var(--border-color);
      color: var(--text-color);
      font-size: 0.8rem;
      padding: 6px 12px;
      border-radius: 6px;
      align-self: flex-end;
    }

    /* 타이머 세션 공통 */
    .timer-section {
      text-align: center;
      padding: 20px 16px;
      margin-bottom: 10px;
    }

    .timer-display {
      font-size: 3.2rem;
      font-weight: bold;
      font-family: monospace;
      margin: 15px 0;
      color: var(--primary-color);
    }

    .timer-controls {
      display: flex;
      gap: 10px;
      justify-content: center;
      margin-bottom: 15px;
    }

    .timer-setup {
      display: flex;
      justify-content: center;
      gap: 5px;
      margin-bottom: 15px;
    }

    .timer-setup select {
      padding: 5px 10px;
      background: var(--card-bg);
      color: var(--text-color);
      border: 1px solid var(--border-color);
      border-radius: 6px;
    }

    button {
      background-color: var(--primary-color);
      color: white;
      border: none;
      padding: 10px 18px;
      border-radius: 8px;
      font-weight: bold;
      cursor: pointer;
      transition: opacity 0.2s;
    }

    button:hover {
      opacity: 0.9;
    }

    button.secondary {
      background-color: var(--border-color);
      color: var(--text-color);
    }

    .alarm-setting {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 20px;
      font-size: 0.85rem;
      color: var(--sub-text);
      border-top: 1px dashed var(--border-color);
      padding-top: 15px;
    }

    /* 할 일 관리 */
    .todo-form {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .input-row {
      display: flex;
      gap: 8px;
    }

    input[type="text"], input[type="time"], select {
      padding: 10px;
      background-color: var(--card-bg);
      color: var(--text-color);
      border: 1px solid var(--border-color);
      border-radius: 6px;
      font-size: 0.9rem;
      outline: none;
    }

    input[type="text"] {
      flex: 1;
    }

    .todo-list {
      list-style: none;
      padding: 0;
      margin: 0;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .todo-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px;
      background-color: var(--bg-color);
      border: 1px solid var(--border-color);
      border-radius: 8px;
    }

    .todo-item.completed span {
      text-decoration: line-through;
      color: var(--sub-text);
    }

    .todo-left {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .difficulty-tag {
      font-size: 0.75rem;
      padding: 2px 6px;
      border-radius: 4px;
      color: white;
      font-weight: bold;
    }

    .diff-상 { background-color: #ff6b6b; }
    .diff-중 { background-color: #fca311; }
    .diff-하 { background-color: #2ec4b6; }

    .delete-btn {
      background: none;
      border: none;
      color: var(--sub-text);
      cursor: pointer;
      font-size: 1rem;
      padding: 0 5px;
    }

    .delete-btn:hover {
      color: #ff6b6b;
    }
  </style>

  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
</head>
<body>

  <div id="lockScreen">
    <div class="lock-box">
      <h2>🔒 스터디 플래너 진입</h2>
      <p style="font-size:0.85rem; color: var(--sub-text); margin-bottom:15px;">접속하려면 4자리 비밀번호를 입력하세요.</p>
      <input type="password" id="pinInput" maxlength="4" placeholder="••••" onkeydown="if(event.key === 'Enter') checkPassword()">
      <button class="lock-btn" onclick="checkPassword()">확인</button>
      <div id="lockError" style="color:#ff6b6b; font-size:0.85rem; display:none; margin-top:10px;">비밀번호가 틀렸습니다.</div>
    </div>
  </div>

  <div class="app-container" id="mainApp">
    <header>
      <h1>스터디 플래너</h1>
      <div class="theme-picker">
        <button class="darkmode-toggle" id="darkModeBtn" onclick="toggleDarkMode()">🌙</button>
        <div class="color-btn" style="background: #70c4e8;" onclick="changeTheme('#70c4e8', '#f0f8ff')"></div>
        <div class="color-btn" style="background: #a8e6cf;" onclick="changeTheme('#a8e6cf', '#f1f9f5')"></div>
        <div class="color-btn" style="background: #ffd3b6;" onclick="changeTheme('#ffd3b6', '#fff9f5')"></div>
      </div>

      <div class="tab-menu">
        <button class="tab-btn active" onclick="switchTab('dashboard')">📊 대시보드</button>
        <button class="tab-btn" onclick="switchTab('timer')">⏱️ 시간관리</button>
        <button class="tab-btn" onclick="switchTab('todos')">✅ 할 일 기록</button>
      </div>
    </header>

    <main>
      <div id="tab-dashboard" class="tab-content active">
        <section class="card profile-section">
          <div id="tierBadge" class="tier-badge">등급 계산 중...</div>
          <div class="streak-info">연속 공부 달성: <strong id="streakCount">0</strong>일</div>
        </section>

        <section class="message-section">
          <div class="message-box" id="motivationMsg">
            공부를 시작할 때입니다! 할 일을 끝내봅시다.
          </div>
          <button class="msg-refresh-btn" onclick="triggerManualMessage()">🔄 메시지 변경</button>
        </section>
      </div>

      <div id="tab-timer" class="tab-content">
        <section class="card timer-section">
          <div style="font-size: 0.9rem; color: var(--sub-text); font-weight: bold;">⏱️ 누적 공부 스톱워치</div>
          <div class="timer-display" id="timerDisplay">00:00:00</div>
          <div class="timer-controls">
            <button id="startTimerBtn" onclick="toggleTimer()">공부 시작</button>
            <button class="secondary" onclick="resetTimer()">리셋</button>
          </div>
        </section>

        <section class="card timer-section">
          <div style="font-size: 0.9rem; color: var(--sub-text); font-weight: bold; margin-bottom: 10px;">⏳ 목표 집중 카운트다운</div>
          
          <div class="timer-setup" id="countdownSetup">
            <select id="cdHour"><option value="0">0시간</option><option value="1" selected>1시간</option><option value="2">2시간</option><option value="3">3시간</option></select>
            <select id="cdMin"><option value="0" selected>0분</option><option value="10">10분</option><option value="20">20분</option><option value="30">30분</option><option value="40">40분</option><option value="50">50분</option></select>
            <select id="cdSec"><option value="0" selected>0초</option><option value="10">10초</option><option value="30">30초</option></select>
          </div>

          <div class="timer-display" id="countdownDisplay" style="color: #ff6b6b;">01:00:00</div>
          
          <div class="timer-controls">
            <button id="startCountdownBtn" onclick="toggleCountdown()" style="background-color: #ff6b6b;">타이머 시작</button>
            <button class="secondary" onclick="resetCountdown()">리셋</button>
          </div>

          <div class="alarm-setting">
            <span>⏰ 지정 시간 입실 알림:</span>
            <input type="time" id="studyAlarmTime" onchange="saveAlarmTime()">
          </div>
        </section>
      </div>

      <div id="tab-todos" class="tab-content">
        <section class="card">
          <div class="todo-form">
            <div class="input-row">
              <input type="text" id="subjectInput" placeholder="과목 (예: 수학)" style="width: 30%;">
              <input type="text" id="todoInput" placeholder="할 일을 입력하세요...">
            </div>
            <div class="input-row">
              <select id="difficultySelect">
                <option value="상">난이도: 상 (우선 공부)</option>
                <option value="중">난이도: 중</option>
                <option value="하">난이도: 하</option>
              </select>
              <button onclick="addTodo()" style="flex: 1;">추가</button>
            </div>
          </div>
          <hr style="margin: 15px 0; border: 0; border-top: 1px solid var(--border-color);">
          <ul class="todo-list" id="todoList">
            </ul>
        </section>
      </div>
    </main>
  </div>

  <script>
    // [보안 설정] 진입 비밀번호 변경은 아래 숫자 4자리를 수정하세요.
    const PASSWORD_PIN = "1234";

    function checkPassword() {
      const input = document.getElementById('pinInput').value;
      const errorEl = document.getElementById('lockError');
      
      if (input === PASSWORD_PIN) {
        document.getElementById('lockScreen').style.display = 'none';
        document.getElementById('mainApp').style.display = 'flex';
      } else {
        errorEl.style.display = 'block';
        document.getElementById('pinInput').value = '';
        document.getElementById('pinInput').focus();
      }
    }

    // 다크모드 제어 토글
    function toggleDarkMode() {
      const currentTheme = document.documentElement.getAttribute('data-theme');
      const btn = document.getElementById('darkModeBtn');
      if (currentTheme === 'dark') {
        document.documentElement.removeAttribute('data-theme');
        btn.innerText = '🌙';
      } else {
        document.documentElement.setAttribute('data-theme', 'dark');
        btn.innerText = '☀️';
      }
    }

    // 탭 전환 기능
    function switchTab(tabId) {
      document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
      document.querySelectorAll('.tab-content').forEach(content => content.classList.remove('active'));
      
      event.target.classList.add('active');
      document.getElementById(`tab-${tabId}`).classList.add('active');
    }

    // Firebase 연동 설정
    const firebaseConfig = {
      apiKey: "AIzaSyANA-lTFGboIfklqQewlVk49GUQ_Am33aE",
      authDomain: "garim-study-planner.firebaseapp.com",
      projectId: "garim-study-planner",
      storageBucket: "garim-study-planner.firebasestorage.app",
      messagingSenderId: "1048447885260",
      appId: "1:1048447885260:web:935234dd0c96860583c769"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const docRef = db.collection('students').doc('10801');

    let appData = {
      todos: [],
      streak: 0,
      alarmTime: '',
      themePrimary: '#70c4e8',
      themeBg: '#f0f8ff'
    };

    if ("Notification" in window && Notification.permission !== "granted") {
      Notification.requestPermission();
    }

    docRef.onSnapshot((doc) => {
      if (doc.exists) {
        appData = doc.data();
        renderApp();
      } else {
        docRef.set({
          todos: [],
          streak: 1,
          lastActiveDate: new Date().toISOString().split('T')[0],
          alarmTime: "20:00",
          themePrimary: '#70c4e8',
          themeBg: '#f0f8ff'
        });
      }
    });

    function renderApp() {
      if(appData.themePrimary && appData.themeBg) {
        document.documentElement.style.setProperty('--primary-color', appData.themePrimary);
        if(!document.documentElement.getAttribute('data-theme')) {
          document.documentElement.style.setProperty('--bg-color', appData.themeBg);
        }
      }

      if(appData.alarmTime) {
        document.getElementById('studyAlarmTime').value = appData.alarmTime;
      }

      updateStreakAndTier();
      
      const listEl = document.getElementById('todoList');
      listEl.innerHTML = '';

      const diffOrder = { '상': 1, '중': 2, '하': 3 };
      const sortedTodos = [...(appData.todos || [])].sort((a, b) => diffOrder[a.difficulty] - diffOrder[b.difficulty]);

      sortedTodos.forEach((todo) => {
        const originalIndex = appData.todos.findIndex(t => t.id === todo.id);
        const li = document.createElement('li');
        li.className = `todo-item ${todo.completed ? 'completed' : ''}`;
        li.innerHTML = `
          <div class="todo-left">
            <input type="checkbox" ${todo.completed ? 'checked' : ''} onchange="toggleTodo(${originalIndex})">
            <span class="difficulty-tag diff-${todo.difficulty}">${todo.difficulty}</span>
            <span><strong>[${escapeHtml(todo.subject)}]</strong> ${escapeHtml(todo.title)}</span>
          </div>
          <button class="delete-btn" onclick="deleteTodo(${originalIndex})">✕</button>
        `;
        listEl.appendChild(li);
      });
    }

    function escapeHtml(str) {
      return str ? str.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;") : '';
    }

    function addTodo() {
      const subject = document.getElementById('subjectInput').value.trim();
      const title = document.getElementById('todoInput').value.trim();
      const difficulty = document.getElementById('difficultySelect').value;

      if (!subject || !title) return alert('과목과 할 일을 모두 입력해주세요.');

      appData.todos.push({
        id: Date.now(),
        subject,
        title,
        difficulty,
        completed: false
      });
      saveData();

      document.getElementById('subjectInput').value = '';
      document.getElementById('todoInput').value = '';
    }

    function toggleTodo(index) {
      appData.todos[index].completed = !appData.todos[index].completed;
      saveData();
    }

    function deleteTodo(index) {
      appData.todos.splice(index, 1);
      saveData();
    }

    function updateStreakAndTier() {
      let streak = appData.streak || 0;
      let tier = "🌱 예비 습관러";
      if (streak >= 15) tier = "👑 공부의 신";
      else if (streak >= 10) tier = "⚡ 공부 마스터";
      else if (streak >= 5) tier = "🏅 우등생";
      else if (streak >= 3) tier = "📖 성실한 학습자";

      document.getElementById('tierBadge').innerText = tier;
      document.getElementById('streakCount').innerText = streak;
    }

    function triggerManualMessage() {
      const msgBox = document.getElementById('motivationMsg');
      const total = appData.todos.length;
      const completed = appData.todos.filter(t => t.completed).length;

      if (total > 0 && completed < total) {
        const pokes = [
          "⚠️ 아직 남은 할 일이 있어요! 지금 안 하면 내일의 당신이 고생합니다.",
          "🔥 미루는 습관은 그만! 할 일을 얼른 체크해보세요.",
          "👀 목표를 다 이루지 못했습니다. 조금만 더 힘내볼까요?"
        ];
        msgBox.innerText = pokes[Math.floor(Math.random() * pokes.length)];
        msgBox.style.borderLeftColor = "#ff6b6b";
      } else {
        const cheers = [
          "🚀 최고의 집중력을 발휘하여 한 걸음 더 나아가 보세요!",
          "✨ 지금의 노력이 모여 눈부신 미래의 당신을 만듭니다.",
          "👍 시작이 반입니다! 오늘도 멋지게 완수해봅시다."
        ];
        msgBox.innerText = cheers[Math.floor(Math.random() * cheers.length)];
        msgBox.style.borderLeftColor = "var(--primary-color)";
      }
    }

    // 1. 누적 공부 스톱워치 로직
    let timerInterval = null;
    let secondsElapsed = 0;
    let isTimerRunning = false;

    function toggleTimer() {
      const btn = document.getElementById('startTimerBtn');
      if (isTimerRunning) {
        clearInterval(timerInterval);
        isTimerRunning = false;
        btn.innerText = '공부 시작';
      } else {
        isTimerRunning = true;
        btn.innerText = '일시 정지';
        
        timerInterval = setInterval(() => {
          secondsElapsed++;
          const hrs = String(Math.floor(secondsElapsed / 3600)).padStart(2, '0');
          const mins = String(Math.floor((secondsElapsed % 3600) / 60)).padStart(2, '0');
          const secs = String(secondsElapsed % 60).padStart(2, '0');
          document.getElementById('timerDisplay').innerText = `${hrs}:${mins}:${secs}`;
        }, 1000);
      }
    }

    function resetTimer() {
      clearInterval(timerInterval);
      isTimerRunning = false;
      secondsElapsed = 0;
      document.getElementById('timerDisplay').innerText = '00:00:00';
      document.getElementById('startTimerBtn').innerText = '공부 시작';
    }


    // 2. 카운트다운 타이머 로직 (신규 추가)
    let countdownInterval = null;
    let countdownTotalSeconds = 0;
    let isCountdownRunning = false;

    function toggleCountdown() {
      const btn = document.getElementById('startCountdownBtn');
      const setupDiv = document.getElementById('countdownSetup');

      if (isCountdownRunning) {
        // 일시정지
        clearInterval(countdownInterval);
        isCountdownRunning = false;
        btn.innerText = '타이머 재개';
      } else {
        // 처음 시작할 때 선택 값 계산
        if (countdownTotalSeconds <= 0) {
          const h = parseInt(document.getElementById('cdHour').value);
          const m = parseInt(document.getElementById('cdMin').value);
          const s = parseInt(document.getElementById('cdSec').value);
          countdownTotalSeconds = (h * 3600) + (m * 60) + s;

          if (countdownTotalSeconds <= 0) {
            alert("시간을 설정해주세요!");
            return;
          }
        }

        isCountdownRunning = true;
        btn.innerText = '일시 정지';
        setupDiv.style.display = 'none'; // 시작하면 셀렉트 박스 숨김

        countdownInterval = setInterval(() => {
          if (countdownTotalSeconds <= 0) {
            clearInterval(countdownInterval);
            isCountdownRunning = false;
            btn.innerText = '타이머 시작';
            setupDiv.style.display = 'flex';
            document.getElementById('countdownDisplay').innerText = "00:00:00";
            
            // 알림 발생
            triggerTimerEndAlarm();
            return;
          }

          countdownTotalSeconds--;
          renderCountdownDisplay();
        }, 1000);
      }
    }

    function resetCountdown() {
      clearInterval(countdownInterval);
      isCountdownRunning = false;
      countdownTotalSeconds = 0;
      document.getElementById('startCountdownBtn').innerText = '타이머 시작';
      document.getElementById('countdownSetup').style.display = 'flex';
      document.getElementById('countdownDisplay').innerText = "01:00:00";
    }

    function renderCountdownDisplay() {
      const hrs = String(Math.floor(countdownTotalSeconds / 3600)).padStart(2, '0');
      const mins = String(Math.floor((countdownTotalSeconds % 3600) / 60)).padStart(2, '0');
      const secs = String(countdownTotalSeconds % 60).padStart(2, '0');
      document.getElementById('countdownDisplay').innerText = `${hrs}:${mins}:${secs}`;
    }

    function triggerTimerEndAlarm() {
      if (Notification.permission === "granted") {
        new Notification("🔔 목표 시간 완료!", { body: "설정한 카운트다운 타이머가 종료되었습니다! 고생하셨습니다." });
      } else {
        alert("🎉 목표 시간 완료! 설정한 타이머가 끝났습니다. 축하합니다!");
      }
    }


    function saveAlarmTime() {
      appData.alarmTime = document.getElementById('studyAlarmTime').value;
      saveData();
    }

    setInterval(() => {
      if (!appData.alarmTime) return;
      const now = new Date();
      const currentTime = `${String(now.getHours()).padStart(2, '0')}:${String(now.getMinutes()).padStart(2, '0')}`;
      
      if (currentTime === appData.alarmTime && now.getSeconds() === 0) {
        if (Notification.permission === "granted") {
          new Notification("📚 공부할 시간입니다!", { body: "플래너를 열어 오늘 해야 할 일을 확인하세요." });
        } else {
          alert("⏰ 공부할 시간입니다! 오늘의 플래너를 체크하세요.");
        }
      }
    }, 1000);

    function changeTheme(primary, bg) {
      appData.themePrimary = primary;
      appData.themeBg = bg;
      saveData();
    }

    function saveData() {
      docRef.set(appData, { merge: true });
    }
  </script>
</body>
</html>
