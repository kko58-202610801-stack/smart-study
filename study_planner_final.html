<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>스터디 플래너</title>
  <style>
    :root {
      --primary-color: #70c4e8;
      --bg-color: #f0f8ff;
      --card-bg: #ffffff;
      --text-color: #333333;
      --sub-text: #666666;
      --border-color: #e0e0e0;
    }

    body {
      margin: 0;
      padding: 0;
      font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, Roboto, sans-serif;
      background-color: var(--bg-color);
      color: var(--text-color);
      display: flex;
      justify-content: center;
      min-height: 100vh;
      transition: background-color 0.3s ease;
    }

    .app-container {
      width: 100%;
      max-width: 480px;
      background-color: var(--card-bg);
      min-height: 100vh;
      box-shadow: 0 0 20px rgba(0, 0, 0, 0.05);
      display: flex;
      flex-direction: column;
      position: relative;
      transition: background-color 0.3s ease;
    }

    /* 헤더 */
    header {
      background-color: var(--primary-color);
      color: white;
      padding: 20px;
      text-align: center;
      position: relative;
      border-bottom-left-radius: 16px;
      border-bottom-right-radius: 16px;
    }

    header h1 {
      margin: 0;
      font-size: 1.3rem;
    }

    .theme-picker {
      position: absolute;
      right: 15px;
      top: 20px;
      display: flex;
      gap: 5px;
    }

    .color-btn {
      width: 20px;
      height: 20px;
      border-radius: 50%;
      border: 2px solid white;
      cursor: pointer;
    }

    /* 메인 컨텐츠 */
    main {
      padding: 20px;
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .card {
      background-color: var(--card-bg);
      border: 1px solid var(--border-color);
      border-radius: 12px;
      padding: 16px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.02);
    }

    /* 프로필 & 스트릭(등급) 섹션 */
    .profile-section {
      text-align: center;
    }

    .tier-badge {
      display: inline-block;
      background-color: var(--primary-color);
      color: white;
      font-weight: bold;
      padding: 6px 16px;
      border-radius: 20px;
      font-size: 0.9rem;
      margin-bottom: 8px;
    }

    .streak-info {
      font-size: 0.85rem;
      color: var(--sub-text);
    }

    /* 응원/쓴소리 메시지 */
    .message-box {
      background-color: rgba(112, 196, 232, 0.15);
      border-left: 4px solid var(--primary-color);
      padding: 12px;
      border-radius: 4px;
      font-size: 0.9rem;
      font-weight: 500;
      line-height: 1.4;
    }

    /* 타이머 (시간 관리) */
    .timer-section {
      text-align: center;
    }

    .timer-display {
      font-size: 2.5rem;
      font-weight: bold;
      font-family: monospace;
      margin: 10px 0;
      color: var(--primary-color);
    }

    .timer-controls {
      display: flex;
      gap: 10px;
      justify-content: center;
    }

    button {
      background-color: var(--primary-color);
      color: white;
      border: none;
      padding: 10px 18px;
      border-radius: 8px;
      font-weight: bold;
      cursor: pointer;
      transition: opacity 0.2s;
    }

    button:hover {
      opacity: 0.9;
    }

    button.secondary {
      background-color: #e0e0e0;
      color: #333;
    }

    /* 알림 설정 UI 추가 */
    .alarm-setting {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 15px;
      font-size: 0.85rem;
      color: var(--sub-text);
      border-top: 1px dashed var(--border-color);
      padding-top: 10px;
    }

    /* 투두 입력폼 */
    .todo-form {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .input-row {
      display: flex;
      gap: 8px;
    }

    input[type="text"], input[type="time"], select {
      padding: 10px;
      border: 1px solid var(--border-color);
      border-radius: 6px;
      font-size: 0.9rem;
      outline: none;
    }

    input[type="text"] {
      flex: 1;
    }

    /* 투두 리스트 */
    .todo-list {
      list-style: none;
      padding: 0;
      margin: 0;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .todo-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px;
      background-color: #fafafa;
      border: 1px solid var(--border-color);
      border-radius: 8px;
    }

    .todo-item.completed span {
      text-decoration: line-through;
      color: #aaa;
    }

    .todo-left {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .difficulty-tag {
      font-size: 0.75rem;
      padding: 2px 6px;
      border-radius: 4px;
      color: white;
      font-weight: bold;
    }

    .diff-상 { background-color: #ff6b6b; }
    .diff-중 { background-color: #fca311; }
    .diff-하 { background-color: #2ec4b6; }

    .delete-btn {
      background: none;
      border: none;
      color: #999;
      cursor: pointer;
      font-size: 1rem;
      padding: 0 5px;
    }

    .delete-btn:hover {
      color: #ff6b6b;
    }
  </style>

  <!-- Firebase CDN (Compat) -->
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
</head>
<body>

  <div class="app-container">
    <header>
      <h1>스터디 플래너</h1>
      <div class="theme-picker">
        <div class="color-btn" style="background: #70c4e8;" onclick="changeTheme('#70c4e8', '#f0f8ff')"></div>
        <div class="color-btn" style="background: #a8e6cf;" onclick="changeTheme('#a8e6cf', '#f1f9f5')"></div>
        <div class="color-btn" style="background: #ffd3b6;" onclick="changeTheme('#ffd3b6', '#fff9f5')"></div>
      </div>
    </header>

    <main>
      <!-- 동기부여 & 등급 섹션 -->
      <section class="card profile-section">
        <div id="tierBadge" class="tier-badge">등급 계산 중...</div>
        <div class="streak-info">연속 공부 달성: <strong id="streakCount">0</strong>일</div>
      </section>

      <!-- 동기부여 메시지 (응원 / 쓴소리) -->
      <section class="message-box" id="motivationMsg">
        오늘도 목표를 향해 달려볼까요? 파이팅!
      </section>

      <!-- 시간 관리 (타이머 및 공부 시작 알림) -->
      <section class="card timer-section">
        <div style="font-size: 0.9rem; color: var(--sub-text);">스톱워치</div>
        <div class="timer-display" id="timerDisplay">00:00:00</div>
        <div class="timer-controls">
          <button id="startTimerBtn" onclick="toggleTimer()">공부 시작</button>
          <button class="secondary" onclick="resetTimer()">리셋</button>
        </div>
        <div class="alarm-setting">
          <span>⏰ 지정 시간 공부 알림:</span>
          <input type="time" id="studyAlarmTime" onchange="saveAlarmTime()">
        </div>
      </section>

      <!-- 할 일 관리 (체크리스트, 우선순위 입력, 과목) -->
      <section class="card">
        <div class="todo-form">
          <div class="input-row">
            <input type="text" id="subjectInput" placeholder="과목 (예: 수학)" style="width: 30%;">
            <input type="text" id="todoInput" placeholder="할 일을 입력하세요...">
          </div>
          <div class="input-row">
            <select id="difficultySelect">
              <option value="상">난이도: 상 (우선 공부)</option>
              <option value="중">난이도: 중</option>
              <option value="하">난이도: 하</option>
            </select>
            <button onclick="addTodo()" style="flex: 1;">추가</button>
          </div>
        </div>
        <hr style="margin: 15px 0; border: 0; border-top: 1px solid var(--border-color);">
        <ul class="todo-list" id="todoList">
          <!-- 할 일 항목이 여기에 동적으로 추가됨 -->
        </ul>
      </section>
    </main>
  </div>

  <script>
    // 1. Firebase 설정 및 초기화
    const firebaseConfig = {
      apiKey: "AIzaSyANA-lTFGboIfklqQewlVk49GUQ_Am33aE",
      authDomain: "garim-study-planner.firebaseapp.com",
      projectId: "garim-study-planner",
      storageBucket: "garim-study-planner.firebasestorage.app",
      messagingSenderId: "1048447885260",
      appId: "1:1048447885260:web:935234dd0c96860583c769"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const docRef = db.collection('students').doc('10801');

    // 앱 데이터 상태
    let appData = {
      todos: [],
      streak: 0,
      lastActiveDate: '',
      alarmTime: '',
      themePrimary: '#70c4e8',
      themeBg: '#f0f8ff'
    };

    // 알림 권한 요청
    if ("Notification" in window && Notification.permission !== "granted") {
      Notification.requestPermission();
    }

    // 2. Firebase 실시간 데이터 동기화
    docRef.onSnapshot((doc) => {
      if (doc.exists) {
        appData = doc.data();
        renderApp();
      } else {
        // 문서가 없을 경우 초기 생성
        docRef.set({
          todos: [],
          streak: 1,
          lastActiveDate: new Date().toISOString().split('T')[0],
          alarmTime: "20:00",
          themePrimary: '#70c4e8',
          themeBg: '#f0f8ff'
        });
      }
    });

    // 3. UI 렌더링 함수
    function renderApp() {
      // 테마 적용
      if(appData.themePrimary && appData.themeBg) {
        document.documentElement.style.setProperty('--primary-color', appData.themePrimary);
        document.documentElement.style.setProperty('--bg-color', appData.themeBg);
      }

      // 알림 시간 적용
      if(appData.alarmTime) {
        document.getElementById('studyAlarmTime').value = appData.alarmTime;
      }

      // 등급 & 동기부여 렌더링
      updateStreakAndTier();
      
      // 투두 리스트 렌더링 (난이도 상 > 중 > 하 순서 정렬)
      const listEl = document.getElementById('todoList');
      listEl.innerHTML = '';

      const diffOrder = { '상': 1, '중': 2, '하': 3 };
      const sortedTodos = [...(appData.todos || [])].sort((a, b) => diffOrder[a.difficulty] - diffOrder[b.difficulty]);

      sortedTodos.forEach((todo, idx) => {
        const originalIndex = appData.todos.findIndex(t => t.id === todo.id);
        const li = document.createElement('li');
        li.className = `todo-item ${todo.completed ? 'completed' : ''}`;
        li.innerHTML = `
          <div class="todo-left">
            <input type="checkbox" ${todo.completed ? 'checked' : ''} onchange="toggleTodo(${originalIndex})">
            <span class="difficulty-tag diff-${todo.difficulty}">${todo.difficulty}</span>
            <span><strong>[${escapeHtml(todo.subject)}]</strong> ${escapeHtml(todo.title)}</span>
          </div>
          <button class="delete-btn" onclick="deleteTodo(${originalIndex})">✕</button>
        `;
        listEl.appendChild(li);
      });
    }

    // HTML 이스케이프 (보안 처리)
    function escapeHtml(str) {
      return str ? str.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;") : '';
    }

    // 4. 할 일 관리 기능
    function addTodo() {
      const subject = document.getElementById('subjectInput').value.trim();
      const title = document.getElementById('todoInput').value.trim();
      const difficulty = document.getElementById('difficultySelect').value;

      if (!subject || !title) return alert('과목과 할 일을 모두 입력해주세요.');

      const newTodo = {
        id: Date.now(),
        subject,
        title,
        difficulty,
        completed: false
      };

      appData.todos.push(newTodo);
      saveData();

      document.getElementById('subjectInput').value = '';
      document.getElementById('todoInput').value = '';
    }

    function toggleTodo(index) {
      appData.todos[index].completed = !appData.todos[index].completed;
      saveData();
    }

    function deleteTodo(index) {
      appData.todos.splice(index, 1);
      saveData();
    }

    // 5. 등급 및 동기부여 메세지 제어
    function updateStreakAndTier() {
      const today = new Date().toISOString().split('T')[0];
      let streak = appData.streak || 0;
      
      // 학업 중심 등급 로직
      let tier = "🌱 예비 습관러";
      if (streak >= 15) tier = "👑 공부의 신";
      else if (streak >= 10) tier = "⚡ 공부 마스터";
      else if (streak >= 5) tier = "🏅 우등생";
      else if (streak >= 3) tier = "📖 성실한 학습자";

      document.getElementById('tierBadge').innerText = tier;
      document.getElementById('streakCount').innerText = streak;

      // 동기부여 메세지 (미완료 할 일이 있으면 쓴 소리)
      const msgBox = document.getElementById('motivationMsg');
      const total = appData.todos.length;
      const completed = appData.todos.filter(t => t.completed).length;

      if (total > 0 && completed < total) {
        const pokes = [
          "⚠️ 아직 남은 할 일이 있어요! 지금 안 하면 내일의 당신이 고생합니다.",
          "🔥 미루는 습관은 그만! 할 일을 얼른 체크해보세요.",
          "👀 목표를 다 이루지 못했습니다. 조금만 더 힘내볼까요?"
        ];
        msgBox.innerText = pokes[Math.floor(Math.random() * pokes.length)];
        msgBox.style.borderLeftColor = "#ff6b6b";
      } else {
        msgBox.innerText = "✨ " + (isTimerRunning ? "집중하는 당신의 모습이 아름답습니다!" : "공부를 시작할 때입니다! 할 일을 끝내봅시다.");
        msgBox.style.borderLeftColor = "var(--primary-color)";
      }
    }

    // 6. 타이머 및 공부 알림 기능
    let timerInterval = null;
    let secondsElapsed = 0;
    let isTimerRunning = false;

    function toggleTimer() {
      const btn = document.getElementById('startTimerBtn');
      if (isTimerRunning) {
        clearInterval(timerInterval);
        isTimerRunning = false;
        btn.innerText = '공부 시작';
      } else {
        isTimerRunning = true;
        btn.innerText = '일시 정지';
        // 응원 메세지 노출
        document.getElementById('motivationMsg').innerText = "🚀 공부 시작! 최고의 집중력을 발휘해보세요!";
        
        timerInterval = setInterval(() => {
          secondsElapsed++;
          const hrs = String(Math.floor(secondsElapsed / 3600)).padStart(2, '0');
          const mins = String(Math.floor((secondsElapsed % 3600) / 60)).padStart(2, '0');
          const secs = String(secondsElapsed % 60).padStart(2, '0');
          document.getElementById('timerDisplay').innerText = `${hrs}:${mins}:${secs}`;
        }, 1000);
      }
    }

    function resetTimer() {
      clearInterval(timerInterval);
      isTimerRunning = false;
      secondsElapsed = 0;
      document.getElementById('timerDisplay').innerText = '00:00:00';
      document.getElementById('startTimerBtn').innerText = '공부 시작';
    }

    function saveAlarmTime() {
      appData.alarmTime = document.getElementById('studyAlarmTime').value;
      saveData();
    }

    // 정각/분 마다 체크하는 지정 시간 알림
    setInterval(() => {
      if (!appData.alarmTime) return;
      const now = new Date();
      const currentTime = `${String(now.getHours()).padStart(2, '0')}:${String(now.getMinutes()).padStart(2, '0')}`;
      
      if (currentTime === appData.alarmTime && now.getSeconds() === 0) {
        if (Notification.permission === "granted") {
          new Notification("📚 공부할 시간입니다!", { body: "플래너를 열어 오늘 해야 할 일을 확인하세요." });
        } else {
          alert("⏰ 공부할 시간입니다! 오늘의 플래너를 체크하세요.");
        }
      }
    }, 1000);

    // 7. 테마 변경
    function changeTheme(primary, bg) {
      appData.themePrimary = primary;
      appData.themeBg = bg;
      saveData();
    }

    // Firebase 저장
    function saveData() {
      docRef.set(appData, { merge: true });
    }
  </script>
</body>
</html>
